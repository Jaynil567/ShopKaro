<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Order Submitted Successfully</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#0f172a;
    color:#e5e7eb;
    font-family:Inter, sans-serif;
    display:flex;
    align-items:center;
    justify-content:center;
    height:100vh;
}
.success-card{
    background:linear-gradient(135deg,#1e1b4b,#020617);
    border:1px solid #312e81;
    border-radius:18px;
    padding:40px;
    max-width:480px;
    width:100%;
    text-align:center;
}
.success-icon{
    width:70px;
    height:70px;
    border-radius:50%;
    background:#22c55e;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#022c22;
    font-size:36px;
    margin:0 auto 20px;
}
.success-title{
    font-size:22px;
    font-weight:700;
    margin-bottom:10px;
}
.success-text{
    font-size:14px;
    color:#cbd5f5;
    margin-bottom:25px;
}
.btn-main{
    background:#4f46e5;
    border:none;
    padding:10px 20px;
    font-weight:600;
}
.btn-main:hover{
    background:#4338ca;
}
    #global-loader {
    position: fixed;
    width: 100%;
    height: 100%;
    background: #0f172a;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
}

.spinner {
    width: 60px;
    height: 60px;
    border: 6px solid #1e293b;
    border-top: 6px solid #38bdf8;
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    100% { transform: rotate(360deg); }
}
</style>
</head>

<body>
    <div id="global-loader" style="display:none;">
    <div class="spinner"></div>
</div>

<div class="success-card">
    <div class="success-icon">✓</div>

    <div class="success-title">Order Submitted Successfully</div>

    <div class="success-text">
        Your order form has been received.<br>
        Our mediator will review your request and contact you if required. <br>
    </div>

    <a href="/Customer_Portal/Dashboard" class="btn btn-main" onclick="showLoader()">Back to Home</a>
</div>
<script>
function showLoader() {
    document.getElementById("global-loader").style.display = "flex";
}
</script>
</body>
</html>
