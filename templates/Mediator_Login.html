<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mediator Portal | ShopKaroDeals</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; min-height: 100vh; background: #F5F5F5; display: flex; align-items: center; justify-content: center; padding: 1rem; }
        
        .login-card {
            background: #FFFFFF; border: 1px solid #E0E0E0; border-radius: 32px;
            padding: 2.5rem; width: 100%; max-width: 460px;
            transition: all 0.3s ease;
        }
        .login-card:hover { border-color: #FF6B35; box-shadow: 0 15px 35px rgba(255,107,53,0.05); }
        
        .logo { text-align: center; margin-bottom: 2rem; position: relative; }
        .logo h2 { font-size: 2rem; font-weight: 800; color: #000; margin: 0; }
        .logo h2 span { color: #FF6B35; }
        .logo::before {
            content: ''; position: absolute; left: 50%; transform: translateX(-50%);
            bottom: -10px; width: 50px; height: 3px; background: #FF6B35; border-radius: 3px;
        }
        .logo p { color: #888; font-size: 0.85rem; margin-top: 1rem; }
        .badge-mediator { background: #FFF3F0; border: 1px solid #FF6B35; color: #FF6B35; padding: 0.25rem 0.75rem; border-radius: 50px; font-size: 0.7rem; font-weight: 600; display: inline-block; margin-top: 0.5rem; }
        
        .form-label { font-weight: 600; color: #333; margin-bottom: 0.5rem; }
        .input-group {
            background: #F5F5F5; border-radius: 60px; border: 1px solid #E0E0E0;
            transition: all 0.3s ease;
        }
        .input-group:focus-within { border-color: #FF6B35; box-shadow: 0 0 0 3px rgba(255,107,53,0.1); }
        .input-group-text { background: transparent; border: none; color: #999; padding: 0 0 0 1.25rem; }
        .form-control { background: transparent; border: none; color: #333; padding: 0.875rem 1.25rem; font-size: 1rem; }
        .form-control:focus { outline: none; box-shadow: none; }
        .form-control::placeholder { color: #BBB; }
        
        .btn-login { background: #000; border: none; padding: 1rem; border-radius: 60px; font-weight: 700; font-size: 1rem; transition: all 0.3s ease; width: 100%; color: white; }
        .btn-login:hover { background: #FF6B35; transform: translateY(-2px); }
        
        .forgot-link { color: #999; text-decoration: none; font-size: 0.8rem; transition: all 0.3s ease; }
        .forgot-link:hover { color: #FF6B35; }
        .back-link { color: #999; text-decoration: none; font-size: 0.85rem; }
        .back-link:hover { color: #FF6B35; }
        
        .alert-custom { background: #FFF3F0; border: 1px solid #FF6B35; border-radius: 60px; color: #FF6B35; font-size: 0.85rem; text-align: center; }
        
        #global-loader { position: fixed; width: 100%; height: 100%; background: rgba(255,255,255,0.95); display: flex; justify-content: center; align-items: center; z-index: 9999; flex-direction: column; gap: 1rem; }
        .modern-loader { width: 50px; height: 50px; border: 3px solid #E0E0E0; border-top: 3px solid #FF6B35; border-radius: 50%; animation: spin 0.8s ease infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="global-loader" style="display:none;"><div class="modern-loader"></div><div style="color:#666;">Verifying credentials...</div></div>
    
    <div class="login-card">
        <div class="logo"><h2>Shop<span>Karo</span></h2><p>Mediator Portal</p><span class="badge-mediator"><i class="bi bi-shield-lock-fill me-1"></i> Authorized Access Only</span></div>
        {% if msg %}<div class="alert alert-custom text-center py-2 mb-4">{{ msg }}</div>{% endif %}
        <form method="post" action="/Mediator_Login">
            <div class="mb-3"><label class="form-label">Username</label><div class="input-group"><span class="input-group-text"><i class="bi bi-person"></i></span><input type="text" name="MUN" class="form-control" placeholder="Enter username" required></div></div>
            <div class="mb-3"><label class="form-label">Password</label><div class="input-group"><span class="input-group-text"><i class="bi bi-lock"></i></span><input type="password" name="MP" class="form-control" placeholder="Enter password" required></div></div>
            <div class="text-end mb-3"><a href="/Med_Forgot_Password" class="forgot-link">Forgot password?</a></div>
            <button type="submit" class="btn-login">Login → <i class="bi bi-arrow-right ms-2"></i></button>
            <p class="text-center mt-4"><a href="/" class="back-link">← Back to Home</a></p>
        </form>
    </div>
    <script>function showLoader() { document.getElementById("global-loader").style.display = "flex"; }</script>
</body>
</html>
