<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/jpeg" href="{{ url_for('static', filename='logo.jpeg') }}">
    <meta charset="UTF-8">
    <title>Welcome | ShopKaroDeals</title>
    <script>setTimeout(()=> {window.location.href="/Customer_Portal/Dashboard"},2000)</script>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; min-height: 100vh; background: #F5F5F5; display: flex; align-items: center; justify-content: center; }
        .success-card { background: #FFFFFF; border: 1px solid #E0E0E0; border-radius: 32px; padding: 2.5rem; width: 100%; max-width: 400px; text-align: center; }
        .logo-round { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; margin-bottom: 1rem; border: 2px solid #FF6B35; }
        .success-icon { font-size: 3rem; color: #10B981; margin-bottom: 1rem; }
        .success-card h3 { font-weight: 800; color: #000; margin-bottom: 0.5rem; }
        .success-card p { color: #888; font-size: 0.85rem; }
        .spinner-small { width: 20px; height: 20px; border: 2px solid #E0E0E0; border-top-color: #FF6B35; border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; margin-left: 10px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="success-card"><img src="/static/logo.jpeg" class="logo-round" alt="ShopKaro"><div class="success-icon"><i class="bi bi-check-circle-fill"></i></div><h3>Registration Successful!</h3><p>Your account has been created successfully.<br>Redirecting to dashboard... <span class="spinner-small"></span></p></div>
</body>
</html>
