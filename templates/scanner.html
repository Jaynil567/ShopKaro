<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>UPI QR Scanner</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
    body {
        margin: 0;
        background: #0f172a;
        color: white;
        font-family: Arial;
        text-align: center;
    }

    h2 {
        margin-top: 20px;
    }

    #reader {
        width: 100%;
        max-width: 400px;
        margin: 30px auto;
        border-radius: 12px;
        overflow: hidden;
    }
</style>
</head>

<body>

<h2>Scan & Pay</h2>
<div id="reader"></div>

<script>

function startScanner() {

    let html5QrCode = new Html5Qrcode("reader");

    html5QrCode.start(
        { facingMode: "environment" },
        {
            fps: 10,
            qrbox: 250
        },

        (decodedText) => {

            console.log("Scanned:", decodedText);

            // ✅ Only allow UPI QR
            if (!decodedText.startsWith("upi://pay")) {
                alert("❌ Only UPI QR allowed");
                return;
            }

            // ✅ (Optional) Only your UPI ID
            // change this to your UPI
            let allowedUpi = "yourupi@okaxis";

            if (!decodedText.includes("pa=" + allowedUpi)) {
                alert("❌ Invalid UPI QR");
                return;
            }

            // stop scanner
            html5QrCode.stop();

            setTimeout(() => {

                // 🔥 Try open UPI app
                window.location.href = decodedText;

                // 🔥 Fallback
                setTimeout(() => {
                    alert("If payment app not opened, please open GPay / PhonePe manually.");
                }, 1500);

            }, 300);
        },

        (error) => {
            // ignore errors
        }
    );
}

// 🔥 AUTO START (no button)
window.onload = startScanner;

</script>

</body>
</html>
