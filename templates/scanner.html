<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/jpeg" href="{{ url_for('static', filename='logo.jpeg') }}">
    <meta charset="UTF-8">
    <title>QR Scanner | ShopKaroDeals</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { margin: 0; background: #F5F5F5; font-family: 'Inter', sans-serif; text-align: center; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        h2 { margin-top: 1rem; color: #000; font-weight: 800; }
        .subtitle { color: #888; font-size: 0.85rem; margin-bottom: 1rem; }
        #reader { width: 100%; max-width: 400px; margin: 1rem auto; border-radius: 24px; overflow: hidden; border: 2px solid #FF6B35; box-shadow: 0 0 20px rgba(255,107,53,0.2); }
        .back-btn { display: inline-flex; align-items: center; gap: 8px; margin-top: 1.5rem; padding: 0.75rem 1.5rem; background: #FF6B35; color: white; text-decoration: none; border-radius: 60px; font-weight: 600; transition: all 0.3s ease; }
        .back-btn:hover { background: #000; transform: translateY(-2px); }
    </style>
</head>
<body>
    <h2><i class="bi bi-qr-code-scan me-2"></i>Scan & Pay</h2>
    <p class="subtitle">Scan any UPI QR code to make payment</p>
    <div id="reader"></div>
    <a href="/" class="back-btn"><i class="bi bi-arrow-left"></i> Back to Home</a>
    <script>
        function startScanner() {
            let html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 },
                (decodedText) => { let decoded; try { decoded = decodeURIComponent(decodedText); } catch { alert("❌ Invalid QR"); return; } if (!decoded.startsWith("upi://pay")) { alert("❌ Only UPI QR allowed"); return; } try { let url = new URL(decoded); let pa = url.searchParams.get("pa"); if (!pa) { alert("❌ Invalid UPI QR"); return; } } catch { alert("❌ Invalid QR format"); return; } html5QrCode.stop(); setTimeout(() => { let a = document.createElement("a"); a.href = decoded; a.style.display = "none"; document.body.appendChild(a); a.click(); setTimeout(() => { window.location.replace(decoded); }, 1000); }, 300); },
                (error) => {}
            );
        }
        window.onload = startScanner;
    </script>
</body>
</html>
