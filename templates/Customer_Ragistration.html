<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/jpeg" href="{{ url_for('static', filename='logo.jpeg') }}">
    <meta charset="UTF-8">
    <title>Join Us | ShopKaroDeals</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; min-height: 100vh; background: #F5F5F5; display: flex; align-items: center; justify-content: center; padding: 1rem; }
        
        .register-card {
            background: #FFFFFF;
            border: 1px solid #E0E0E0;
            border-radius: 32px;
            padding: 2.5rem;
            width: 100%;
            max-width: 500px;
            transition: all 0.3s ease;
        }
        .register-card:hover { border-color: #FF6B35; }
        
        .logo { text-align: center; margin-bottom: 2rem; position: relative; }
        .logo h2 { font-size: 2rem; font-weight: 800; color: #000000; margin: 0; }
        .logo h2 span { color: #FF6B35; }
        .logo::before {
            content: '';
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            bottom: -10px;
            width: 50px;
            height: 3px;
            background: #FF6B35;
            border-radius: 3px;
        }
        .logo p { color: #888888; font-size: 0.85rem; margin-top: 1rem; }
        
        .form-label { font-weight: 600; color: #333; margin-bottom: 0.5rem; }
        .input-group {
            background: #F5F5F5;
            border-radius: 60px;
            border: 1px solid #E0E0E0;
            transition: all 0.3s ease;
        }
        .input-group:focus-within { border-color: #FF6B35; box-shadow: 0 0 0 3px rgba(255,107,53,0.1); }
        .input-group-text {
            background: transparent;
            border: none;
            color: #999;
            padding: 0 0 0 1.25rem;
        }
        .form-control {
            background: transparent;
            border: none;
            color: #333;
            padding: 0.875rem 1.25rem;
            font-size: 1rem;
        }
        .form-control:focus { outline: none; box-shadow: none; }
        .form-control::placeholder { color: #BBB; }
        
        .btn-register {
            background: #000000;
            border: none;
            padding: 1rem;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1rem;
            transition: all 0.3s ease;
            width: 100%;
            color: white;
        }
        .btn-register:hover { background: #FF6B35; transform: translateY(-2px); }
        
        .login-link { color: #FF6B35; text-decoration: none; font-weight: 600; }
        .login-link:hover { text-decoration: underline; }
        .back-link { color: #999; text-decoration: none; font-size: 0.85rem; }
        .back-link:hover { color: #FF6B35; }
        
        .alert-custom {
            background: #FFF3F0;
            border: 1px solid #FF6B35;
            border-radius: 60px;
            color: #FF6B35;
            font-size: 0.85rem;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="register-card">
        <div class="logo"><h2>Shop<span>Karo</span></h2><p>Create your account and start saving</p></div>
        {% if msg %}<div class="alert alert-custom text-center py-2 mb-4">{{ msg }}</div>{% endif %}
        <form method="post" action="/Customer_Ragistration">
            <div class="mb-3"><label class="form-label">Full Name</label><div class="input-group"><span class="input-group-text"><i class="bi bi-person"></i></span><input type="text" name="N" class="form-control" placeholder="Enter your full name" required></div></div>
            <div class="mb-3"><label class="form-label">WhatsApp Number</label><div class="input-group"><span class="input-group-text">+91</span><input type="tel" name="Num" class="form-control" placeholder="Enter 10-digit number" maxlength="10" minlength="10" required></div></div>
            <div class="mb-3"><label class="form-label">Email Address</label><div class="input-group"><span class="input-group-text"><i class="bi bi-envelope"></i></span><input type="email" name="E" class="form-control" placeholder="Enter your email" required></div></div>
            <div class="mb-4"><label class="form-label">UPI ID</label><div class="input-group"><span class="input-group-text"><i class="bi bi-credit-card"></i></span><input type="text" name="upi" class="form-control" placeholder="Enter your UPI ID" required></div></div>
            <button type="submit" class="btn-register">Register → <i class="bi bi-arrow-right ms-2"></i></button>
            <p class="text-center mt-4 mb-2">Already have an account? <a href="/Customer_Login" class="login-link">Login</a></p>
            <p class="text-center"><a href="/" class="back-link">← Back to Home</a></p>
        </form>
    </div>
</body>
</html>
