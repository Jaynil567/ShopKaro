<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Select Action</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #0f172a;
            color: #e5e7eb;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card-box {
            width: 100%;
            max-width: 420px;
            background: #020617;
            border: 1px solid #1e293b;
            border-radius: 16px;
            padding: 30px;
            text-align: center;
        }

        .title {
            font-weight: 600;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 13px;
            color: #94a3b8;
            margin-bottom: 25px;
        }

        .btn-custom {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border-radius: 10px;
            font-weight: 600;
        }

        .btn-order {
            background: #2563eb;
            border: none;
        }

        .btn-order:hover {
            background: #1d4ed8;
        }

        .btn-refund {
            background: #16a34a;
            border: none;
        }

        .btn-refund:hover {
            background: #15803d;
        }
    </style>
</head>

<body>

<div class="card-box">

    <h5 class="title">Choose Option</h5>
    <p class="subtitle">Select what you want to do</p>

    <!-- Order Form Button -->
    <a href="/Normal_orderform">
        <button class="btn btn-custom btn-order">
            Order Form
        </button>
    </a>

    <!-- Refund Form Button -->
    <a href="/Check_Order_for_refund">
        <button class="btn btn-custom btn-refund">
            Refund Form
        </button>
    </a>

</div>

</body>
</html>
