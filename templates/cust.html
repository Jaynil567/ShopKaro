<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Choose Action | ShopKaroDeals</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #F5F5F5; display: flex; justify-content: center; align-items: center; height: 100vh; padding: 1rem; }
        .card-box { width: 100%; max-width: 420px; background: #FFFFFF; border: 1px solid #E0E0E0; border-radius: 32px; padding: 2rem; text-align: center; }
        .title { font-weight: 800; color: #000; margin-bottom: 0.5rem; }
        .subtitle { font-size: 0.85rem; color: #888; margin-bottom: 1.5rem; }
        .btn-custom { width: 100%; padding: 0.875rem; margin-bottom: 0.75rem; border-radius: 60px; font-weight: 700; font-size: 1rem; transition: all 0.3s ease; border: none; color: white; }
        .btn-order { background: #FF6B35; }
        .btn-order:hover { background: #000; transform: translateY(-2px); }
        .btn-refund { background: #10B981; }
        .btn-refund:hover { background: #000; transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="card-box"><h5 class="title">Choose Option</h5><p class="subtitle">Select what you want to do</p>
    <a href="/Normal_orderform"><button class="btn-custom btn-order"><i class="bi bi-file-earmark-text me-2"></i> Order Form</button></a>
    <a href="/Check_Order_for_refund"><button class="btn-custom btn-refund"><i class="bi bi-arrow-repeat me-2"></i> Refund Form</button></a></div>
