<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>🔥 Deal Alert | ShopKaroDeals</title>
    <meta property="og:title" content="🔥 Deal Alert">
    <meta property="og:description" content="Product: {{ deal[1] }} | Price: ₹{{ deal[4] }}">
    <meta property="og:image" content="{{ deal[0] }}">
    <meta property="og:url" content="{{ request.url }}">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #F5F5F5; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 1rem; }
        .deal-card { background: #FFFFFF; border: 1px solid #E0E0E0; border-radius: 32px; padding: 2rem; max-width: 400px; width: 100%; text-align: center; }
        .deal-card h2 { font-size: 1.8rem; font-weight: 800; color: #000; margin-bottom: 1rem; }
        .deal-card img { width: 100%; max-width: 280px; border-radius: 20px; margin: 1rem 0; border: 2px solid #FF6B35; }
        .price { font-size: 2.5rem; font-weight: 800; color: #FF6B35; margin: 0.5rem 0; }
        .code { font-size: 0.8rem; color: #888; font-family: monospace; background: #F5F5F5; padding: 0.5rem 1rem; border-radius: 60px; display: inline-block; }
        .btn-buy { display: inline-flex; align-items: center; gap: 8px; margin-top: 1.5rem; padding: 0.75rem 1.5rem; background: #FF6B35; color: white; text-decoration: none; border-radius: 60px; font-weight: 600; transition: all 0.3s ease; }
        .btn-buy:hover { background: #000; transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="deal-card"><h2>🔥 Deal Alert</h2><img src="{{ deal[0] }}" alt="Product Image"><div class="price">₹{{ deal[4] }}</div><p><strong>{{ deal[1] }}</strong></p><p>{{ deal[2] }} • {{ deal[3] }}</p><div class="code">Code: {{ deal[1] }}</div><a href="https://wa.me/917440250871?text=Hi%20ShopKaro!%20I%20am%20interested%20in%20this%20deal!%0A%0AProduct%20code:%20{{deal[1]}}%0APlatform:%20{{deal[2]}}%0ADeal%20type:%20{{deal[3]}}%0AOrder%20price:%20₹{{deal[4]}}%0ARefund:%20₹{{deal[5]}}" target="_blank" class="btn-buy"><i class="bi bi-whatsapp"></i> Buy Now</a></div>
</body>
</html>
