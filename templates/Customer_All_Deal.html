<!DOCTYPE html>
<html lang="en">

<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <meta charset="UTF-8">
    <title>Customer Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        .orders-table-container {
            width: 100%;
            overflow-x: auto;
        }

        .orders-table {
            width: 100%;
            min-width: 100%;
        }

        .orders-table thead tr {
            background: #0b1220;
        }

        .orders-table thead th {
            padding: 18px 20px;
            text-align: left;
            font-size: 13px;
            font-weight: 500;
            color: #64748b;
            letter-spacing: 0.5px;
        }

        .orders-table thead th:last-child {
            text-align: right;
        }

        .orders-table tbody tr {
            background: #111827;
            transition: 0.3s ease;
        }

        .orders-table td {
            padding: 18px 20px;
            color: #e5e7eb;
            border: none;
        }

        .orders-table td:last-child {
            text-align: right;
        }

        .orders-wrapper {
            padding: 10px;
            border-radius: 20px;
            background: linear-gradient(145deg, #0a0f1f, #0f172a);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.6);
        }

        .orders-title {
            font-weight: 600;
            color: #facc15;
            letter-spacing: 0.5px;
        }

        .orders-count {
            padding: 8px 18px;
            border-radius: 50px;
            background: rgba(59, 130, 246, 0.15);
            color: #3b82f6;
            font-weight: 600;
            font-size: 14px;
        }

        .orders-table {
            border-collapse: separate;
            border-spacing: 0 14px;
        }

        .orders-table thead th {
            color: #94a3b8;
            font-weight: 500;
            font-size: 13px;
            padding-bottom: 10px;
        }

        .orders-table tbody tr {
            background: #111827;
            border-radius: 14px;
            transition: 0.3s ease;
        }

        .orders-table tbody tr:hover {
            background: #1f2937;
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5);
        }

        .orders-table td {
            padding: 18px 20px;
            color: #e5e7eb;
            border: none;
        }

        .order-id {
            color: #38bdf8;
            font-weight: 600;
            letter-spacing: 0.4px;
        }

        .payout-chip-done {
            background: linear-gradient(135deg, #16a34a, #22c55e);
            padding: 6px 16px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 13px;
            color: white;
        }

        .payout-chip-pending {
            background: linear-gradient(135deg, #f4ff26, #575c03);
            padding: 6px 16px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 13px;
            color: white;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            padding-top: env(safe-area-inset-top);
            font-family: 'Inter', sans-serif;
            background: #0f172a;
            color: #e5e7eb;
        }

        /* ===== SIDEBAR ===== */
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: 230px;
            height: 100vh;
            background: linear-gradient(180deg, #020617, #020617);
            padding: 20px;
        }

        .sidebar h4 {
            color: #facc15;
            margin-bottom: 30px;
            font-weight: 700;
        }

        .sidebar a {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px;
            color: #cbd5f5;
            text-decoration: none;
            border-radius: 8px;
            margin-bottom: 6px;
            font-size: 14px;
        }

        .sidebar a:hover,
        .sidebar a.active {
            background: #1e293b;
            color: #ffffff;
        }

        /* ===== TOPBAR ===== */
        .topbar {
            padding-top: calc(10px + env(safe-area-inset-top));
            height: 56px;
            margin-left: 230px;
            background: #020617;
            border-bottom: 1px solid #1e293b;
            display: flex;
            align-items: center;
            padding: 0 18px;
        }

        .menu-btn {
            font-size: 1.5rem;
            cursor: pointer;
            display: none;
            color: #f8fafc;
        }

        .top-title {
            font-weight: 600;
            font-size: 16px;
        }

        /* ===== PROFILE ===== */
        .profile {
            margin-left: auto;
            display: flex;
            align-items: center;
        }

        .profile-name {
            font-size: 14px;
            font-weight: 600;
        }

        .profile-role {
            font-size: 11px;
            color: #94a3b8;
        }

        .avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6366f1, #22d3ee);
            color: #020617;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            margin-left: 10px;
        }

        /* ===== MAIN ===== */
        .main {
            margin-left: 230px;
            padding: 24px;
        }

        /* ===== STATS CARDS ===== */
        /* DESKTOP - 4 in row */
        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 25px;
        }

        .stat-card {
            background: #020617;
            border: 1px solid #1e293b;
            border-radius: 14px;
            padding: 18px;
            transition: .3s;
        }

        /* MOBILE - 2x2 */
        @media (max-width: 768px) {

            .stats {
                grid-template-columns: repeat(2, 1fr);
                gap: 15px;
            }

            .stat-card {
                height: 120px;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                text-align: center;
                border-radius: 20px;
            }
        }

        .stat-card {
            background: #020617;
            border: 1px solid #1e293b;
            border-radius: 14px;
            padding: 18px;
            transition: .3s;
        }

        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 0 0 1px #38bdf8;
        }

        .stat-icon {
            font-size: 22px;
            margin-bottom: 10px;
        }

        .stat-value {
            font-size: 22px;
            font-weight: 700;
        }

        .stat-label {
            font-size: 13px;
            color: #94a3b8;
        }

        /* ===== WELCOME CARD ===== */
        .welcome {
            background: linear-gradient(135deg, #1e293b, #020617);
            border-radius: 16px;
            padding: 22px;
            border: 1px solid #1e293b;
        }

        /* ===== RESPONSIVE ===== */
        @media(max-width:768px) {
            .sidebar {
                left: -240px
            }

            .sidebar.active {
                left: 0
            }

            .topbar,
            .main {
                margin-left: 0
            }

            .menu-btn {
                display: block
            }
        }

        /* Sidebar */
        @media (max-width: 768px) {
            #sidebar {
                position: fixed;
                left: -260px;
                top: 0;
                width: 260px;
                height: 100%;
                background: #111;
                transition: 0.3s;
                z-index: 1000;
            }

            /* Open sidebar */
            #sidebar.active {
                left: 0;
            }
        }

        /* Overlay */
        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            z-index: 999;
        }

        #overlay.active {
            display: block;
        }

        #global-loader {
            position: fixed;
            width: 100%;
            height: 100%;
            background: #0f172a;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 6px solid #1e293b;
            border-top: 6px solid #38bdf8;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        .deals-wrapper {
            padding: 20px;
            border-radius: 20px;
            background: linear-gradient(145deg, #0a0f1f, #0f172a);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.6);
        }

        @media(max-width:768px) {

            .deals-title {
                font-size: 20px;
            }
        }

        .deals-table {
            width: 100%;
            table-layout: auto;
            border-collapse: separate;
            border-spacing: 0 14px;
        }

        .deals-table th {
            font-size: 13px;
            color: #94a3b8;
            padding: 10px 20px;
            text-align: left;
        }

        .deals-table td {
            padding: 18px 20px;
            background: #111827;
        }

        .deals-table tbody tr:hover {
            background: #1f2937;
            transform: translateY(-3px);
        }

        .deal-img {
            width: 55px;
            height: 55px;
            border-radius: 10px;
            object-fit: cover;
        }

        /* MOBILE */

        @media(max-width:768px) {

            .sidebar {
                left: -240px
            }

            .sidebar.active {
                left: 0
            }

            .topbar,
            .main {
                margin-left: 0
            }

            .deals-table {
                min-width: 700px;
            }

        }

        .deals-table th,
        .deals-table td {
            white-space: nowrap;
        }

        .deals-table th:last-child,
        .deals-table td:last-child {
            text-align: right;
        }
    </style>
</head>

<body>
    <div id="global-loader" style="display:none;">
        <div class="spinner"></div>
    </div>
    <div id="overlay"></div>
    <!-- SIDEBAR -->
    <div class="sidebar" id="sidebar">
        <h4>{{ NAME }} Deals</h4>
        <a href="/Customer_Portal/Dashboard" onclick="showLoader()"><i class="bi bi-speedometer2"></i>
            Dashboard</a>
        <a href="/orderform" onclick="showLoader()"><i class="bi bi-file-earmark-text"></i> Add Order</a>
        <a href="/customer/deals" class="active" onclick="showLoader()"><i class="bi bi-tag"></i> All Deals</a>
    </div>

    <!-- TOPBAR -->
    <div class="topbar">
        <i class="bi bi-list menu-btn" onclick="openSidebar()"></i>
        <div class="top-title">All Deals</div>

        <div class="profile">
            <div class="text-end me-2">
                <div class="profile-name">{{ name }}</div>
                <div class="profile-role">Customer</div>
            </div>
            <div class="avatar">{{ name[0] }}</div>
        </div>
    </div>


    <!-- MAIN -->
    <div class="main">

        <div class="deals-wrapper">

            <div class="d-flex justify-content-between align-items-center mb-4">



                <h3 class="deals-title">All Deals</h3>



            </div>


            <div style="overflow-x:auto">

                <table class="deals-table">

                    <thead>

                        <tr>

                            <th>Image</th>
                            <th>Product Code</th>
                            <th>Platform</th>
                            <th>Deal Type</th>
                            <th>Order Price</th>
                            <th>Refund</th>
                            <th>Link</th>

                        </tr>

                    </thead>

                    <tbody>

                        {% for d in deals %}

                        <tr>

                            <td>

                                {% if d[0] %}
                                <img src="{{ d[0] }}" class="deal-img">
                                {% else %}
                                <img src="/static/logo.jpeg" class="deal-img">
                                {% endif %}

                            </td>

                            <td>{{ d[1] }}</td>
                            <td>{{ d[2] }}</td>
                            <td>{{ d[3] }}</td>
                            <td>₹{{ d[4] }}</td>
                            <td class="text-success">₹{{ d[5] }}</td>
                            <td>
                                <a href="https://wa.me/917440250871" target="_blank" class="btn btn-primary btn-sm">
                                    <i class="bi bi-link-45deg"></i>
                                </a>
                            </td>

                        </tr>

                        {% endfor %}

                    </tbody>

                </table>

            </div>

        </div>

    </div>
    <script>
        function showLoader() {
            document.getElementById("global-loader").style.display = "flex";
        }
        document.addEventListener("click", function (e) {
            let sidebar = document.querySelector(".sidebar");

            // ONLY mobile par close hoga
            if (window.innerWidth <= 768) {
                if (!e.target.closest(".sidebar") && !e.target.closest(".menu-btn")) {
                    sidebar.classList.remove("active");
                }
            }
        });
    </script>
    <script>
        const sidebar = document.getElementById("sidebar");
        const overlay = document.getElementById("overlay");

        // open sidebar
        function openSidebar() {
            sidebar.classList.add("active");
            overlay.classList.add("active");
        }

        // close sidebar
        function closeSidebar() {
            sidebar.classList.remove("active");
            overlay.classList.remove("active");
        }

        // overlay click -> close sidebar
        overlay.addEventListener("click", closeSidebar);

        // outside click (optional advanced)
        document.addEventListener("click", function (e) {
            if (!sidebar.contains(e.target) && !e.target.closest(".menu-btn")) {
                closeSidebar();
            }
        });


        function toggleSidebar() {
            document.getElementById("sidebar").classList.toggle("active");
        }


        function goOF() {
            window.location.href = "{{ url_for('orderform')}}";
        }

        function goRF(OI, DC, RN) {
            window.location.href = "/refundform?id=" + OI + "&DealCode=" + DC + "&ProfileName=" + RN;
        }
    </script>

</body>

</html>
