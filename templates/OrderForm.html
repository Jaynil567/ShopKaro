<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Order Form | ShopKaroDeals</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #F5F5F5; color: #333; }
        .main { max-width: 900px; margin: 2rem auto; padding: 1rem; }
        .welcome-banner { background: #FFFFFF; border: 1px solid #E0E0E0; border-radius: 20px; padding: 1.5rem; margin-bottom: 1.5rem; }
        .welcome-banner h5 { margin: 0; font-weight: 700; color: #000; }
        .welcome-banner p { margin: 0.5rem 0 0 0; color: #888; font-size: 0.85rem; }
        .form-card { background: #FFFFFF; border: 1px solid #E0E0E0; border-radius: 24px; padding: 2rem; }
        .form-label { font-weight: 600; color: #333; margin-bottom: 0.5rem; }
        .form-control, .form-select { background: #F5F5F5; border: 1px solid #E0E0E0; border-radius: 60px; padding: 0.75rem 1.25rem; color: #333; transition: all 0.3s ease; }
        .form-control:focus, .form-select:focus { outline: none; border-color: #FF6B35; box-shadow: 0 0 0 3px rgba(255,107,53,0.1); background: #FFFFFF; }
        .form-control::placeholder { color: #BBB; }
        .btn-submit { background: #FF6B35; border: none; padding: 1rem; border-radius: 60px; font-weight: 700; font-size: 1rem; transition: all 0.3s ease; width: 100%; color: white; margin-top: 1rem; }
        .btn-submit:hover { background: #000; transform: translateY(-2px); }
        .alert-custom { background: #FFF3F0; border: 1px solid #FF6B35; border-radius: 60px; color: #FF6B35; font-size: 0.85rem; text-align: center; }
        #global-loader { position: fixed; width: 100%; height: 100%; background: rgba(255,255,255,0.95); display: flex; justify-content: center; align-items: center; z-index: 9999; flex-direction: column; gap: 1rem; }
        .modern-loader { width: 50px; height: 50px; border: 3px solid #E0E0E0; border-top: 3px solid #FF6B35; border-radius: 50%; animation: spin 0.8s ease infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @media (max-width: 768px) { .form-card { padding: 1.5rem; } }
    </style>
</head>
<body>
    <div id="global-loader" style="display:none;"><div class="modern-loader"></div><div style="color:#666;">Submitting order...</div></div>
    <div class="main"><div class="welcome-banner"><h5><i class="bi bi-file-earmark-text me-2"></i>Submit Your Order</h5><p>Please fill correct details for fast processing</p></div>
    <div class="form-card">{% if msg %}<div class="alert alert-custom text-center py-2 mb-4">{{ msg }}</div>{% endif %}
    <form method="POST" enctype="multipart/form-data"><div class="row g-3">
        <div class="col-md-6"><label class="form-label">Brand Name *</label><select class="form-select" name="brand" required><option value="" hidden>-- Select Brand Name --</option>{% for brand in brands %}<option value="{{ brand[0] }}">{{ brand[0] }}</option>{% endfor %}</select></div>
        <div class="col-md-6"><label class="form-label">Order Date *</label><input type="date" class="form-control" name="order_date" required></div>
        <div class="col-md-6"><label class="form-label">Product Name *</label><input type="text" class="form-control" name="PN" placeholder="Enter Product Name" required></div>
        <div class="col-md-6"><label class="form-label">Order ID *</label><input type="text" class="form-control" name="order_id" placeholder="Enter Your Order ID" required></div>
        <div class="col-md-6"><label class="form-label">Profile Name *</label><input type="text" class="form-control" name="reviewer_name" placeholder="Enter Profile Name" required></div>
        <div class="col-md-6"><label class="form-label">Order Amount *</label><input type="number" class="form-control" name="amount" placeholder="Enter Order Amount" required></div>
        <div class="col-md-6"><label class="form-label">Refund Amount *</label><input type="number" class="form-control" name="refund_amount" placeholder="Enter Refund Amount" required></div>
        <div class="col-md-6"><label class="form-label">WhatsApp Number *</label><input type="tel" class="form-control" name="W" placeholder="Enter WhatsApp Number" required></div>
        <div class="col-md-6"><label class="form-label">UPI ID *</label><input type="text" class="form-control" name="upi" placeholder="Enter UPI ID" required></div>
        <div class="col-md-6"><label class="form-label">Mediator Name *</label><select class="form-select" name="mediator" required><option value="" hidden>-- Select Mediator --</option>{% for m in mediators %}<option value="{{ m[1] }}">{{ m[1] }}</option>{% endfor %}</select></div>
        <div class="col-md-12"><label class="form-label">Order Screenshot *</label><input type="file" class="form-control" name="screenshot" required accept="image/*"></div>
    </div><button class="btn-submit" onclick="showLoader()">Submit Order <i class="bi bi-arrow-right ms-2"></i></button></form></div></div>
    <script>function showLoader() { document.getElementById("global-loader").style.display = "flex"; }</script>
</body>
</html>
