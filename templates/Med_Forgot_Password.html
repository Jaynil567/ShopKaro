<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Forgot Password | ShopKaroDeals</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; min-height: 100vh; background: #F5F5F5; display: flex; align-items: center; justify-content: center; padding: 1rem; }
        .card { background: #FFFFFF; border: 1px solid #E0E0E0; border-radius: 32px; padding: 2rem; width: 100%; max-width: 400px; }
        .card h4 { font-weight: 800; color: #000; text-align: center; margin-bottom: 0.5rem; }
        .card p { color: #888; font-size: 0.85rem; text-align: center; margin-bottom: 1.5rem; }
        .form-control { background: #F5F5F5; border: 1px solid #E0E0E0; border-radius: 60px; padding: 0.75rem 1.25rem; color: #333; }
        .form-control:focus { outline: none; border-color: #FF6B35; box-shadow: 0 0 0 3px rgba(255,107,53,0.1); }
        .btn-send { background: #FF6B35; border: none; padding: 0.75rem; border-radius: 60px; font-weight: 600; width: 100%; color: white; transition: all 0.3s ease; }
        .btn-send:hover { background: #000; transform: translateY(-2px); }
        .back-link { color: #999; text-decoration: none; font-size: 0.85rem; }
        .back-link:hover { color: #FF6B35; }
        .alert-custom { background: #FFF3F0; border: 1px solid #FF6B35; border-radius: 60px; color: #FF6B35; font-size: 0.85rem; text-align: center; }
    </style>
</head>
<body>
    <div class="card"><h4>Forgot Password</h4><p>Enter your registered email address</p>
    <form method="post" action="/Med_Forgot_Password"><input type="email" name="email" class="form-control mb-3" placeholder="Email Address" required><button type="submit" class="btn-send">Send Verification Code</button>{% if msg %}<div class="alert alert-custom text-center py-2 mt-3">{{ msg }}</div>{% endif %}<p class="text-center mt-3"><a href="/Mediator_Login" class="back-link">← Back to Login</a></p></form></div>
</body>
</html>
