<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/jpeg" href="{{ url_for('static', filename='logo.jpeg') }}">
    <meta charset="UTF-8">
    <title>Refund Form | ShopKaroDeals</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #F5F5F5; color: #333; }
        
        .main { max-width: 800px; margin: 2rem auto; padding: 1rem; }
        .action-buttons { display: flex; justify-content: flex-end; gap: 1rem; margin-bottom: 1.5rem; }
        .btn-glass { background: #FFFFFF; border: 1px solid #E0E0E0; border-radius: 50px; padding: 0.5rem 1.2rem; color: #333; text-decoration: none; transition: all 0.3s ease; }
        .btn-glass:hover { background: #FF6B35; color: white; border-color: #FF6B35; transform: translateY(-2px); }
        
        .welcome-banner {
            background: #FFFFFF; border: 1px solid #E0E0E0; border-radius: 20px;
            padding: 1.5rem; margin-bottom: 1.5rem;
        }
        .welcome-banner h5 { margin: 0; font-weight: 700; color: #000; }
        .welcome-banner p { margin: 0.5rem 0 0 0; color: #888; font-size: 0.85rem; }
        
        .form-card {
            background: #FFFFFF; border: 1px solid #E0E0E0; border-radius: 24px; padding: 2rem;
        }
        .form-label { font-weight: 600; color: #333; margin-bottom: 0.5rem; }
        .form-control {
            background: #F5F5F5; border: 1px solid #E0E0E0; border-radius: 60px;
            padding: 0.75rem 1.25rem; color: #333; transition: all 0.3s ease;
        }
        .form-control:focus { outline: none; border-color: #FF6B35; box-shadow: 0 0 0 3px rgba(255,107,53,0.1); background: #FFFFFF; }
        .form-control:disabled { opacity: 0.6; background: #F5F5F5; }
        
        .btn-submit {
            background: #000; border: none; padding: 1rem; border-radius: 60px;
            font-weight: 700; font-size: 1rem; transition: all 0.3s ease;
            width: 100%; color: white; margin-top: 1rem;
        }
        .btn-submit:hover { background: #FF6B35; transform: translateY(-2px); }
        
        .alert-custom {
            background: #FFF3F0; border: 1px solid #FF6B35; border-radius: 60px;
            color: #FF6B35; font-size: 0.85rem; text-align: center;
        }
        
        #global-loader {
            position: fixed; width: 100%; height: 100%; background: rgba(255,255,255,0.95);
            display: flex; justify-content: center; align-items: center; z-index: 9999;
            flex-direction: column; gap: 1rem;
        }
        .modern-loader { width: 50px; height: 50px; border: 3px solid #E0E0E0; border-top: 3px solid #FF6B35; border-radius: 50%; animation: spin 0.8s ease infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        
        @media (max-width: 768px) { .form-card { padding: 1.5rem; } }
    </style>
</head>
<body>
    <div id="global-loader" style="display:none;"><div class="modern-loader"></div><div style="color:#666;">Submitting refund request...</div></div>
    
    <div class="main">
        <div class="action-buttons"><a href="/" class="btn-glass"><i class="bi bi-house me-1"></i> Home</a><a href="/Customer_Portal/Dashboard" class="btn-glass"><i class="bi bi-speedometer2 me-1"></i> Dashboard</a></div>
        <div class="welcome-banner"><h5><i class="bi bi-arrow-repeat me-2"></i>Submit Your Refund Request</h5><p>Please fill correct details for fast processing</p></div>
        <div class="form-card">
            {% if msg %}<div class="alert alert-custom text-center py-2 mb-4">{{ msg }}</div>{% endif %}
            <form method="POST" enctype="multipart/form-data" onsubmit="showLoader()">
                <div class="row g-3">
                    <div class="col-md-6"><label class="form-label">Deal Code *</label>{% if DC %}<input type="text" class="form-control" value="{{ DC }}" disabled>{% else %}<input type="text" class="form-control" name="deal_code" required>{% endif %}</div>
                    <div class="col-md-6"><label class="form-label">Order ID *</label>{% if id %}<input type="text" class="form-control" value="{{ id }}" disabled>{% else %}<input type="text" class="form-control" name="order_id_p" required>{% endif %}</div>
                    <div class="col-md-6"><label class="form-label">Reviewer Name *</label><input type="text" class="form-control" value="{{ RN if RN else '' }}" name="reviewer_name" required></div>
                    <div class="col-md-6"><label class="form-label">Delivered Screenshot *</label><input type="file" class="form-control" name="D-screenshot" required multiple accept="image/*"></div>
                    <div class="col-md-6"><label class="form-label">Review Screenshot *</label><input type="file" class="form-control" name="Review-screenshot" required multiple accept="image/*"></div>
                    <div class="col-md-6"><label class="form-label" id="link_lable">Review Link</label><input type="text" class="form-control" name="link" placeholder="Enter Review Link" id="link_input"></div>
                </div>
                <button class="btn-submit">Submit Request <i class="bi bi-arrow-right ms-2"></i></button>
            </form>
        </div>
    </div>
    
    <script>
        if("{{DC}}"==='Bob&bae'){ document.getElementById("link_lable").innerHTML="Instagram Post Link *"; document.getElementById("link_input").setAttribute("placeholder","Enter Instagram Post Link"); }
        function showLoader() { document.getElementById("global-loader").style.display = "flex"; }
    </script>
</body>
</html>
