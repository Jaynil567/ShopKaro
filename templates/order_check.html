<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Check Order | ShopKaroDeals</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #F5F5F5; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 1rem; }
        .card-box { background: #FFFFFF; border: 1px solid #E0E0E0; border-radius: 32px; padding: 2rem; width: 100%; max-width: 450px; }
        .card-box h5 { font-weight: 800; color: #000; margin-bottom: 0.5rem; }
        .subtitle { color: #888; font-size: 0.85rem; margin-bottom: 1.5rem; }
        .form-label { font-weight: 600; color: #333; margin-bottom: 0.5rem; }
        .form-control { background: #F5F5F5; border: 1px solid #E0E0E0; border-radius: 60px; padding: 0.75rem 1.25rem; color: #333; }
        .form-control:focus { outline: none; border-color: #FF6B35; box-shadow: 0 0 0 3px rgba(255,107,53,0.1); }
        .btn-primary { background: #FF6B35; border: none; padding: 0.75rem; border-radius: 60px; font-weight: 600; width: 100%; color: white; transition: all 0.3s ease; }
        .btn-primary:hover { background: #000; transform: translateY(-2px); }
        .alert-custom { background: #FFF3F0; border: 1px solid #FF6B35; border-radius: 60px; color: #FF6B35; font-size: 0.85rem; text-align: center; }
    </style>
</head>
<body>
    <div class="card-box"><h5>Refund Request</h5><p class="subtitle">Enter your Order ID to check status</p>{% if msg %}<div class="alert alert-custom text-center py-2 mb-3">{{ msg }}</div>{% endif %}
    <form method="POST"><div class="mb-3"><label class="form-label">Order ID *</label><input type="text" class="form-control" name="order_id" placeholder="Enter Order ID" required></div><button class="btn-primary">Get Refund Form <i class="bi bi-arrow-right ms-2"></i></button></form></div>
</body>
</html>
