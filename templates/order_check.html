<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Check Order</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #0f172a;
            color: #e5e7eb;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card-box {
            width: 100%;
            max-width: 420px;
            background: #020617;
            border: 1px solid #1e293b;
            border-radius: 16px;
            padding: 25px;
        }

        .title {
            font-weight: 600;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 13px;
            color: #94a3b8;
            margin-bottom: 20px;
        }

        .form-label {
            color: #facc15;
        }

        .btn-primary {
            background: #2563eb;
            border: none;
        }

        .btn-primary:hover {
            background: #1d4ed8;
        }
    </style>
</head>

<body>

<div class="card-box">

    <h5 class="title">Refund</h5>
    <p class="subtitle">Enter your Order ID to check status</p>

    {% if msg %}
    <div class="alert alert-danger text-center py-2">
        {{ msg }}
    </div>
    {% endif %}

    <form method="POST">

        <div class="mb-3">
            <label class="form-label">Order ID *</label>
            <input type="text" class="form-control" name="order_id" placeholder="Enter Order ID" required>
        </div>

        <button class="btn btn-primary w-100">
            Get Refund Form
        </button>

    </form>

</div>

</body>
</html>
